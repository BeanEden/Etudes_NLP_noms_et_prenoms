{% extends "base.html" %}
{% block title %}Page introuvable — Etymia{% endblock %}
{% block content %}
<div style="text-align:center; padding: 6rem 1rem;">
  <p style="font-family:'Cormorant Garamond',serif; font-size:0.82rem; letter-spacing:0.22em; text-transform:uppercase; color:var(--gold); margin-bottom:1.2rem;">Erreur 404</p>
  <h1 style="font-family:'Cormorant Garamond',serif; font-size:3.5rem; font-weight:300; color:var(--navy); margin-bottom:0.8rem;">Nom introuvable</h1>
  <div style="width:48px; height:2px; background:var(--gold); margin:0 auto 1.5rem;"></div>
  <p style="color:var(--text-soft); font-style:italic; margin-bottom:2.5rem;">
    Ce nom ne figure pas dans notre base de données, ou l'adresse est incorrecte.
  </p>
  <a href="/" style="display:inline-block; padding:0.75rem 2rem; background:var(--navy); color:var(--cream); text-decoration:none; font-size:0.88rem; letter-spacing:0.1em; text-transform:uppercase; border-radius:4px; transition:background 0.2s;"
     onmouseover="this.style.background='#3D5278'" onmouseout="this.style.background='#1A2B4A'">
    Retour à la recherche
  </a>
</div>
{% endblock %}
