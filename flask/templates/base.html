<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Origines des Noms{% endblock %}</title>

  <!-- Fonts : Cormorant Garamond (display) + Libre Baskerville (corps) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    /* ── Variables ───────────────────────────────────────────────── */
    :root {
      --cream:       #F7F3EC;
      --cream-dark:  #EDE7D9;
      --navy:        #1A2B4A;
      --navy-mid:    #2C3E5D;
      --navy-light:  #3D5278;
      --gold:        #B8973A;
      --gold-light:  #D4B05A;
      --text:        #2A2A2A;
      --text-soft:   #5A5A5A;
      --border:      rgba(26,43,74,0.15);
      --shadow:      0 4px 32px rgba(26,43,74,0.08);
      --shadow-deep: 0 8px 48px rgba(26,43,74,0.14);
    }

    /* ── Reset & base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Libre Baskerville', Georgia, serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
      /* texture papier subtile */
      background-image:
        radial-gradient(ellipse at 20% 0%, rgba(184,151,58,0.06) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 100%, rgba(26,43,74,0.05) 0%, transparent 55%);
    }

    /* ── Header ─────────────────────────────────────────────────── */
    header {
      background: var(--navy);
      padding: 0 2.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-logo {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      text-decoration: none;
    }
    .header-logo-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.04em;
    }
    .header-logo-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      font-weight: 300;
      color: var(--gold-light);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    /* barre de recherche header */
    .header-search {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 6px;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
    }
    .header-search:focus-within {
      background: rgba(255,255,255,0.13);
      border-color: var(--gold-light);
    }
    .header-search input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0.5rem 1rem;
      color: var(--cream);
      font-family: 'Libre Baskerville', serif;
      font-size: 0.88rem;
      width: 240px;
    }
    .header-search input::placeholder { color: rgba(247,243,236,0.45); }
    .header-search button {
      background: transparent;
      border: none;
      padding: 0 0.9rem;
      color: var(--gold-light);
      cursor: pointer;
      font-size: 1.05rem;
      line-height: 38px;
      transition: color 0.2s;
    }
    .header-search button:hover { color: var(--cream); }

    /* ── Autocomplete ────────────────────────────────────────────── */
    .autocomplete-wrap { position: relative; }
    .autocomplete-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--navy);
      border: 1px solid var(--gold);
      border-radius: 6px;
      list-style: none;
      z-index: 200;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: var(--shadow-deep);
    }
    .autocomplete-list li a {
      display: block;
      padding: 0.55rem 1rem;
      color: var(--cream);
      text-decoration: none;
      font-size: 0.88rem;
      font-family: 'Libre Baskerville', serif;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      transition: background 0.15s;
    }
    .autocomplete-list li a:hover { background: var(--navy-light); color: var(--gold-light); }
    .autocomplete-list li:last-child a { border-bottom: none; }

    /* ── Layout principal ───────────────────────────────────────── */
    main { max-width: 1280px; margin: 0 auto; padding: 2.5rem 2rem 4rem; }

    /* ── Footer ─────────────────────────────────────────────────── */
    footer {
      text-align: center;
      padding: 1.8rem;
      color: var(--text-soft);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
      border-top: 1px solid var(--border);
      font-style: italic;
    }

    /* ── Utilitaires ─────────────────────────────────────────────── */
    .tag {
      display: inline-block;
      padding: 0.22rem 0.75rem;
      border: 1px solid var(--gold);
      border-radius: 2px;
      font-size: 0.75rem;
      color: var(--gold);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: 'Libre Baskerville', serif;
    }
    .tag.navy {
      border-color: var(--navy-light);
      color: var(--navy-light);
    }

    .divider {
      width: 48px;
      height: 2px;
      background: var(--gold);
      margin: 0.6rem 0 1.2rem;
    }

    /* ── Animations ─────────────────────────────────────────────── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.55s ease both; }
    .fade-up-2 { animation: fadeUp 0.55s 0.12s ease both; }
    .fade-up-3 { animation: fadeUp 0.55s 0.24s ease both; }
    .fade-up-4 { animation: fadeUp 0.55s 0.36s ease both; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<header>
  <div style="display:flex; align-items:center; gap:2rem;">
    <a href="/" class="header-logo">
      <span class="header-logo-main">Etymia</span>
      <span class="header-logo-sub">Origines des noms</span>
    </a>
    <nav style="display:flex; gap:1.5rem; align-items: center;">
      <a href="/stats" style="color:var(--cream); text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:1.1rem; letter-spacing:0.04em;">Statistiques</a>
      <a href="/admin/regroupement" style="color:var(--gold-light); text-decoration:none; font-family:'Cormorant Garamond',serif; font-size:1.1rem; letter-spacing:0.04em;">Admin NLP</a>
    </nav>
  </div>

  <div class="autocomplete-wrap">
    <form class="header-search" action="/" method="get" autocomplete="off">
      <input type="text" name="q" id="header-q" placeholder="Rechercher un nom…" value="{{ request.args.get('q','') }}">
      <button type="submit">&#9906;</button>
    </form>
    <ul class="autocomplete-list" id="header-ac" style="display:none"></ul>
  </div>
</header>

<main>{% block content %}{% endblock %}</main>

<footer>Etymia &mdash; Base de données étymologique des noms de famille</footer>

<script>
  /* ── Autocomplétion header ───────────────────────────────────── */
  (function() {
    const input = document.getElementById('header-q');
    const list  = document.getElementById('header-ac');
    if (!input) return;
    let timer;

    input.addEventListener('input', function() {
      clearTimeout(timer);
      const q = this.value.trim();
      if (q.length < 2) { list.style.display = 'none'; return; }
      timer = setTimeout(function() {
        fetch('/api/search?q=' + encodeURIComponent(q))
          .then(r => r.json())
          .then(data => {
            if (!data.length) { list.style.display = 'none'; return; }
            list.innerHTML = data.map(d =>
              `<li><a href="/${d.type_entite}/${encodeURIComponent(d.nom)}">${d.nom_original}</a></li>`
            ).join('');
            list.style.display = 'block';
          });
      }, 160);
    });

    document.addEventListener('click', function(e) {
      if (!input.contains(e.target) && !list.contains(e.target))
        list.style.display = 'none';
    });
  })();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
